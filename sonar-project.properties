# SonarQube / SonarLint configuration (v2.7.0)
sonar.projectKey=semantic-graph-healer
sonar.projectName=Semantic Graph Healer
sonar.projectVersion=2.7.0

# Path to sources
sonar.sources=.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=node_modules/**, dist/**, **/*.test.ts, .husky/**

# Language specific rules
sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.node.maxstacksize=4096

# Quality Gates (2026 Standards)
sonar.qualitygate.wait=true
sonar.cpd.exclusions=**/*.test.ts
